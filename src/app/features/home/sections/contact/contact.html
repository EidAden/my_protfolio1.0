<section class="contact-section" id="contact">
  <div class="background-images">
    <div class="ellipse12">
      <img class="ell_img12" src="images/contact/Ellipse12.png" alt="" />
    </div>

    <div class="ellipse13">
      <img class="ell_img13" src="images/contact/Ellipse14.png" alt="" />
    </div>

    <div class="ellipse14">
      <img class="ell_img14" src="images/contact/Ellipse13.png" alt="" />
    </div>
  </div>

  <div class="contact-inner">
    <h2 class="contact-title">Contact</h2>

    <div class="contact-container">
      <div class="contact-left">
        <h3>Got a problem to solve?</h3>

        <p class="contact-text">
          I am a Frontend Developer focused on clean code and modern design. I am looking for
          opportunities to contribute and grow — feel free to contact me.
        </p>

        <p class="contact-note">
          Need a Frontend developer?
          <span>Contact me!</span>
        </p>
      </div>

      <div class="contact-right">
        <form class="contact-form">
          <input type="text" placeholder="Your name" />
          <input type="email" placeholder="Your email" />
          <textarea placeholder="Your message"></textarea>

          <div class="privacy-row">
            <input type="checkbox" id="privacy" />
            <label for="privacy">
              I've read the <a href="#">privacy policy</a> and agree to the processing of my data as
              outlined.
            </label>
          </div>

          <button type="submit">Say hello ;)</button>
        </form>
      </div>
    </div>

    <div class="btn_icon">
      <img class="icon-default" src="images/contact/d_icon.png" alt="default icon" />
      <img class="icon-hover" src="images/contact/h_icon.png" alt="hover icon" />
    </div>
  </div>
</section>
