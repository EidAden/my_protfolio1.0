<div class="hero__section" id="hero">
  <div class="bg-hero">
    <img class="hero_ellipse" src="images/hero/ellipse_3.png" alt="" />
    <img class="hero_photo" src="images/hero/photo.png" alt="profile" />

    <div class="hero-overlay">
      <div class="hero-content">
        <h4 class="hero-name">Hi, I'm Eid Aden</h4>
        <h1 class="hero-title">
          FRONTEND <br />
          DEVELOPER
        </h1>
      </div>
    </div>

    <div class="hero-bottom">
      <div class="scroll__down" *ngIf="!menuOpen">
        <img src="/images/mobile/scroll_down.png" alt="" />
      </div>

      <div class="disktop_menu">
        <div class="scroll_line">
          <p>Scroll</p>
          <img src="images/hero/line.png" alt="line" />
        </div>

        <div class="social-icons">
          <img src="images/hero/github.png" alt="github" class="github-icon" />
          <img src="images/hero/email.png" alt="email" class="email-icon" />
          <img src="images/hero/link.png" alt="linkedin" class="linkedin-icon" />
        </div>
      </div>
    </div>
  </div>
</div>
