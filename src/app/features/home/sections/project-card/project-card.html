<div class="all">
  <div class="project-card" [id]="id()" [class.reverse]="reverse()">
    <div class="project-image">
      <img [src]="image()" [alt]="title() + ' Project'" />
    </div>

    <div class="project-info">
      <h3 class="project-title">{{ title() }}</h3>
      <p class="project-tech">{{ tech() }}</p>
      <p class="project-description">
        {{ description() }}
      </p>

      <div class="project-buttons">
        <a href="https://github.com/EidAden/Join" target="_blank" class="btn github">Github</a>
        <a
          href="https://eid-aden.developerakademie.net/Join/login.html?skipAnimation=true"
          target="_blank"
          class="btn live"
        >
          Live Test
        </a>
      </div>
    </div>
  </div>
</div>
