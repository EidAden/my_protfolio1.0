<div class="all">
  <div class="project-card" [id]="id()" [class.reverse]="reverse()">
    <div class="project-image">
      <img [src]="image()" [alt]="title() + ' Project'" />
    </div>

    <div class="project-info">
      <h3 class="project-title">{{ title() }}</h3>
      <p class="project-tech">{{ tech() }}</p>
      <p class="project-description">
        {{ description() }}
      </p>

      <div class="project-links">
        <a href="https://github.com/EidAden/Join" target="_blank" class="btn github">
          <app-buttons
            text="Github"
            font_family="Poppins, sans-serif"
            font_weight="400"
          ></app-buttons>
        </a>

        <a
          class="live-btn"
          href="https://eid-aden.developerakademie.net/Join/login.html?skipAnimation=true"
          target="_blank"
          class="btn live"
        >
          <app-buttons text="Live Test" font_family="Poppins, sans-serif"></app-buttons>
        </a>
      </div>
    </div>
  </div>
</div>
