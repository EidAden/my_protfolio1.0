<div class="about" id="about">
  <div class="about__ellipse about__ellipse--big">
    <img src="images/about/Ellipse _5.png" alt="" />
  </div>

  <div class="about__ellipse about__ellipse--small">
    <img src="images/about/Ellipse _6.png" alt="" />
  </div>

  <div class="about__card">
    <div class="about__left">
      <h3 class="about__title">{{ 'infos.title' | transloco }}</h3>

      <div class="about__info-box">
        <h3 class="about__subtitle">{{ 'infos.subtitle' | transloco }}</h3>

        <div class="group">
          <div class="about__facts">
            <div class="about__fact">
              <div class="icon-swap">
                <img class="icon-default" src="images/about/loco_d.png" alt="Location icon" />
                <img class="icon-hover" src="images/about/loc_icon.png" alt="Location icon hover" />
              </div>
              <p>{{ 'infos.location' | transloco }}</p>
            </div>

            <div class="about__fact">
              <div class="icon-swap">
                <img class="icon-default" src="images/about/remote_d.png" alt="Remote icon" />
                <img class="icon-hover" src="images/about/remote_h.png" alt="Remote icon hover" />
              </div>
              <p>{{ 'infos.remote' | transloco }}</p>
            </div>

            <div class="about__fact">
              <div class="icon-swap">
                <img class="icon-default" src="images/about/d_reloc.png" alt="Relocate icon" />
                <img class="icon-hover" src="images/about/h_reloc.png" alt="Relocate icon hover" />
              </div>
              <p>{{ 'infos.relocate' | transloco }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="about__right">
      <div class="about__text">
        <p>
          {{ 'about.description1' | transloco }}
        </p>

        <p>
          {{ 'about.description2' | transloco }}
        </p>
      </div>

      <a href="#contact" class="btn">
        <app-buttons text=" Send a Message" font_size="18px" width_btn="350px"></app-buttons>
      </a>
    </div>
  </div>
</div>
