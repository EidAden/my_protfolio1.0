<div class="projects-section">
  <div class="projects-content">
    <div class="text_section">
      <h2 class="overlay_title">My Works</h2>
      <p class="text_info">
        Explore a selection of my work here - Interact with projects to see my skills in action.
      </p>
    </div>

    <div class="overlay_container">
      @for (project of projects; track project.id) {
        <app-project-card
          [id]="project.id"
          [title]="project.title"
          [tech]="project.tech"
          [description]="project.description"
          [image]="project.image"
          [github]="project.github"
          [live]="project.live"
          [reverse]="project.reverse"
        >
        </app-project-card>
      }
    </div>

    <div class="background-shapes">
      <div class="ell7">
        <img src="images/back-img/Ellipse7.png" alt="" />
      </div>

      <div class="ell8">
        <img src="images/back-img/Ellipse8.png" alt="" />
      </div>

      <div class="ell4">
        <img src="images/back-img/Ellipse4.png" alt="" />
      </div>

      <div class="ell10">
        <img src="images/back-img/Ellipse10.png" alt="" />
      </div>

      <div class="ell9">
        <img src="images/back-img/Ellipse9.png" alt="" />
      </div>

      <div class="ell11">
        <img src="images/back-img/Ellipse11.png" alt="" />
      </div>

      <div class="ell12">
        <img src="images/back-img/Ellipse12.png" alt="" />
      </div>
    </div>
  </div>
</div>
